apiVersion: cluster.open-cluster-management.io/v1beta1
kind: Placement
metadata:
  name: all-managed-clusters
  namespace: openshift-gitops
spec:
  predicates:
    - requiredClusterSelector:
        labelSelector:
          matchLabels:
            # Seleciona os clusters que marcamos com essa label no Helm
            apps.open-cluster-management.io/replicate-to-argocd: "true"
